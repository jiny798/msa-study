server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: first-service
            uri: http://localhost:8081
            predicates:
              - Path=/first-service/**
          - id: second-service
            uri: http://localhost:8082
            predicates:
              - Path=/second-service/**
