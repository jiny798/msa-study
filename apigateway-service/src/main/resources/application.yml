server:
  port: 8080

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
#  profiles:
#    active: dev
  application:
    name: apigateway-service
#  config:
#    import: "optional:configserver:http://localhost:8888" #이거대신 부트스트랩 yml 파일에서 가져옴
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # user-service: 회원가입
            - id: user-service-register
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user-service/users
                - Method=POST
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/user-service/(?<segment>.*), /$\{segment}

            # user-service: 로그인
            - id: user-service-login
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user-service/login
                - Method=POST
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/user-service/(?<segment>.*), /$\{segment}

            # user-service: 그 외 요청 커스텀 필터 등록
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user-service/**
                - Method=GET
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/user-service/(?<segment>.*), /$\{segment}
                - AuthorizationHeaderFilter

            # catalog-service:
            - id: catalog-service
              uri: lb://CATALOG-SERVICE
              predicates:
                - Path=/catalog-service/**

            # order-service:
            - id: catalog-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order-service/**

management:
  endpoints:
    web:
      exposure:
        include:
          - refresh # 변경된 yml 파일을 config server 로부터 가져온다
          - health
          - beans
          - info
          - httpexchanges

