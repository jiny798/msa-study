server:
  port: 0

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.uuid}:${PID}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: user-service
#  config:
#    import: "optional:configserver:http://localhost:8888" #이거대신 부트스트랩 yml 파일에서 가져옴
  datasource:
    url: jdbc:mysql://localhost:3308/msa_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        hbm2ddl.extra_physical_table_types: PARTITIONED TABLE
  logging:
    level:
      org.hibernate.SQL: DEBUG

greeting:
  message: Welcome to the Simple E-commerce.

#token:
#  expiration-time: 86400000 #10 days
#  secret: my-secret-long-key-77777777777777-9999999999999-8888888888888

management:
  endpoints:
    web:
      exposure:
        include:
          - refresh # 변경된 yml 파일을 config server 로부터 가져온다
          - health
          - beans
          - info