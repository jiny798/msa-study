server:
  port: 0

spring:
  sql:
    init:
      mode: never
  application:
    name: catalog-service
  datasource:
    url: jdbc:mysql://localhost:3308/msa_db?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        hbm2ddl.extra_physical_table_types: PARTITIONED TABLE

  logging:
    level:
      org.hibernate.SQL: DEBUG